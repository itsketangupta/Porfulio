<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>It'skKetanGupta</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="Assests/favicon.svg" type="image/x-icon">
  <script src="script.js" defer></script>
</head>

<body>
  <nav>
    <li><a href="#about">About</a></li>
    <li><a href="#canvas">Projects</a></li>
    <li><a href="mailto:mrketanartist13@gmail.com">Contact</a></li>
  </nav>
  <header>
    <div class="hand"><img src="Assests/hand.svg" alt=""></div>
    <div class="side">
      <img class="side_plant" src="Assests/plant.svg" alt="">
    </div>
    <div class="profile">
      <div class="logo"><img src="Assests/favicon.svg" alt=""></div>
    </div>
    <div class="center">
      <img src="Assests/header_back_img.svg" alt="">
    </div>
    <div class="right_side">
      <img class="side_drink" src="Assests/drink.svg" alt="">
    </div>
  </header>
  <div class="bottom_of_part">
    <div class="left_side">
      <div class="music_player">
        <div class="disc"><img src="Assests/disc.svg" alt=""></div>
        <div class="playlist" style="display: flex; justify-content: center; color: grey;">PLAYLIST</div>
        <div class="h1" style="display: flex; justify-content: center;">Made by Me</div>
        <img class="headphone" src="Assests/headphone.svg" alt="">
      </div>
    </div>
    <div class="h1_bottom_of_header">
      <img class="wow" src="Assests/wow.svg" alt="">
      <img class="sign" src="Assests/Ketan Gupta.svg" alt="">
      <img class="star" src="Assests/star.svg" alt="">
    </div>
    <div class="folder">
      <div class="inner_part"><img src="Assests/folder_backward.svg" alt=""></div>
      <img class="claud folder_inner" src="Assests/claud.svg" alt="" style="scale: 0.95;">
      <img class="tablet_and_phone folder_inner" src="Assests/tablet_and_phone.svg" alt="" style="scale: 0.95;">
      <img class="lappy folder_inner" src="Assests/lappy.svg" alt="" style="scale: 0.95;">
      <div class="upper_part"><img src="Assests/folder_front.svg" alt=""></div>
    </div>
    <div class="camera"><img src="Assests/camera.svg" alt=""></div>
  </div>
  <div id="about">
    <h1>WHO AM I</h1>
    <div class="main">
      <div class="left_img">
        <img src="Assests/about_copy.svg" alt="">
      </div>
      <div class="right_img">
        <img class="pen" src="Assests/pen.svg" alt="">
        <div class="ink"><img src="Assests/pen_ink.svg" alt=""></div>
      </div>
    </div>
  </div>
  <div class="sticky_note">
    <div class="time_box">
      <div class="left">
        <div id="date"></div>
        <div id="day"></div>
      </div>

      <div class="right">
        <div id="time"></div>
      </div>

    </div>
  </div>
  <div class="play_ground" style="display: flex; justify-content: center; width: 100%;">
    <div id="canvas">
      <div class="quizify"><a href="#"><img src="Assests/quizify.svg" class="img" style="top:50px; left:50px;"></a><div class=""></div></div>
      <div class="tuneora"><a href="#"><img src="Assests/tuneora.svg" class="img" style="top:150px; left:200px;"></a><div class=""></div></div>
      <div class="netflix"><a href="#"><img src="Assests/netflix.svg" class="img" style="top:10px; right:40px;"></a><div class=""></div></div>
      <div class="weather"><a href="#"><img src="Assests/weather.svg" class="img" style="top:50px; left:50px;"></a><div class=""></div></div>
      <div class="to_do"><a href="#"><img src="Assests/to_do.svg" class="img" style="bottom:20px; left:20px;"></a><div class=""></div></div>
      <div class="recipi_finder"><a href="#"><img src="Assests/recipi_finder.svg" class="img" style="bottom:40px; right:40px;"><div class=""></div></a></div>
    </div>
  </div>
</body>

</html>
